<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوق الدواجن DZ</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#E8610A;
  --primary-light:#FF8C42;
  --primary-pale:#FFF3EC;
  --green:#00A86B;
  --green-dark:#007A4D;
  --brown:#3E1F00;
  --gold:#D4A017;
  --gold-light:#F5C842;
  --bg:#FFF8F2;
  --card:#FFFFFF;
  --gray:#F5EFE8;
  --gray2:#EDE5DA;
  --text:#1A0A00;
  --text2:#7A5C3E;
  --red:#E53935;
  --radius:16px;
  --shadow:0 4px 20px rgba(62,31,0,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ===== HEADER ===== */
.header{
  background:white;
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.logo-area{display:flex;align-items:center;gap:8px;flex-shrink:0}
.logo-icon{
  width:40px;height:40px;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.3rem;
  box-shadow:0 3px 10px rgba(232,97,10,0.35);
}
.logo-text{line-height:1.1}
.logo-name{font-family:'Amiri',serif;font-size:1.2rem;font-weight:700;color:var(--primary)}
.logo-sub{font-size:0.65rem;color:var(--text2)}

.header-search{
  flex:1;position:relative;
}
.header-search input{
  width:100%;background:var(--gray);
  border:2px solid transparent;border-radius:50px;
  padding:8px 34px 8px 14px;
  font-family:'Tajawal',sans-serif;font-size:0.88rem;color:var(--text);
  outline:none;transition:border-color 0.2s;
}
.header-search input:focus{border-color:var(--primary);background:var(--primary-pale)}
.header-search input::placeholder{color:#bbb}
.s-ico{position:absolute;right:11px;top:50%;transform:translateY(-50%);font-size:1rem;color:#bbb}

.post-btn-top{
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border:none;border-radius:50px;
  padding:9px 16px;color:white;
  font-family:'Tajawal',sans-serif;font-weight:800;font-size:0.82rem;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  box-shadow:0 3px 12px rgba(232,97,10,0.35);transition:all 0.2s;
}
.post-btn-top:hover{transform:scale(1.05)}

.user-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--gray);border:2px solid var(--gray2);
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all 0.2s;
}
.user-btn.logged{border-color:var(--primary);background:var(--primary-pale)}
.user-btn:hover{border-color:var(--primary)}

/* ===== CATS ===== */
.cats-bar{
  background:white;padding:10px 14px;
  border-bottom:1px solid var(--gray2);
  overflow:hidden;
}
.cats-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.cats-scroll::-webkit-scrollbar{display:none}
.cat-pill{
  flex-shrink:0;background:var(--gray);
  border:2px solid transparent;border-radius:50px;
  padding:7px 14px;
  font-family:'Tajawal',sans-serif;font-size:0.84rem;font-weight:500;
  color:var(--text2);cursor:pointer;white-space:nowrap;transition:all 0.2s;
}
.cat-pill:hover{border-color:var(--primary);color:var(--primary)}
.cat-pill.active{
  background:var(--primary);border-color:var(--primary);
  color:white;font-weight:700;
  box-shadow:0 3px 12px rgba(232,97,10,0.3);
}

/* ===== HERO ===== */
.hero{
  margin:12px 12px 0;border-radius:var(--radius);
  background:linear-gradient(135deg,var(--brown) 0%,#6B3A1F 60%,var(--primary) 100%);
  padding:16px;display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 8px 28px rgba(62,31,0,0.3);position:relative;overflow:hidden;
}
.hero::before{content:'🐔';position:absolute;font-size:7rem;left:-20px;top:-15px;opacity:0.07}
.hero-stats{display:flex;align-items:center;gap:10px}
.hstat{text-align:center}
.hstat-n{font-size:1.3rem;font-weight:900;color:var(--gold-light)}
.hstat-l{font-size:0.65rem;color:rgba(255,255,255,0.75)}
.hdiv{width:1px;height:34px;background:rgba(255,255,255,0.2)}
.hero-btn{
  background:var(--gold);border:none;border-radius:50px;
  padding:10px 16px;color:var(--brown);
  font-family:'Tajawal',sans-serif;font-weight:800;font-size:0.82rem;
  cursor:pointer;white-space:nowrap;flex-shrink:0;
  box-shadow:0 3px 12px rgba(212,160,23,0.4);transition:all 0.2s;
}
.hero-btn:hover{background:var(--gold-light);transform:scale(1.05)}

/* ===== SECTION ===== */
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:16px 14px 8px}
.sec-title{font-family:'Amiri',serif;font-size:1.15rem;color:var(--text);display:flex;align-items:center;gap:6px}
.sec-all{font-size:0.82rem;color:var(--primary);font-weight:700;cursor:pointer;border:none;background:none;font-family:'Tajawal',sans-serif}

/* ===== GRID ===== */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 12px}
@media(min-width:480px){.prod-grid{grid-template-columns:repeat(3,1fr)}}

/* ===== CARD ===== */
.prod-card{
  background:var(--card);border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);
  transition:all 0.3s;cursor:pointer;
  animation:fadeUp 0.4s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.prod-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(62,31,0,0.15)}

.card-img-wrap{
  position:relative;width:100%;aspect-ratio:1;
  display:flex;align-items:center;justify-content:center;font-size:4rem;
}
.badge{
  position:absolute;top:8px;right:8px;
  padding:4px 10px;border-radius:50px;
  font-size:0.68rem;font-weight:700;color:white;
}
.b-new{background:var(--primary)}
.b-urgent{background:var(--red)}
.b-fresh{background:var(--green)}

.fav-ico{
  position:absolute;top:8px;left:8px;
  width:30px;height:30px;background:white;
  border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:0.95rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:all 0.2s;
}
.fav-ico:hover{transform:scale(1.15)}

.card-body{padding:10px 11px 12px}
.card-cat{font-size:0.68rem;color:var(--primary);font-weight:700;margin-bottom:2px}
.card-name{
  font-size:0.9rem;font-weight:800;color:var(--text);
  margin-bottom:3px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-desc{
  font-size:0.72rem;color:var(--text2);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:7px;
}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-price{font-size:1rem;font-weight:900;color:var(--primary)}
.card-loc{font-size:0.68rem;color:var(--text2)}
.card-btns{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.btn-detail{
  background:var(--gray);border:none;border-radius:50px;
  padding:7px;font-family:'Tajawal',sans-serif;font-size:0.78rem;font-weight:700;
  color:var(--text);cursor:pointer;transition:all 0.2s;
}
.btn-contact{
  background:var(--green);border:none;border-radius:50px;
  padding:7px;font-family:'Tajawal',sans-serif;font-size:0.78rem;font-weight:700;
  color:white;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:3px;
  box-shadow:0 3px 10px rgba(0,168,107,0.3);transition:all 0.2s;
}
.btn-detail:hover{background:var(--gray2)}
.btn-contact:hover{background:var(--green-dark)}

/* BG COLORS */
.c1{background:linear-gradient(135deg,#FFF8DC,#FFF0A0)}
.c2{background:linear-gradient(135deg,#FFF0E0,#FFD9B8)}
.c3{background:linear-gradient(135deg,#E8F5E9,#C8E6C9)}
.c4{background:linear-gradient(135deg,#E3F2FD,#BBDEFB)}
.c5{background:linear-gradient(135deg,#F3E5F5,#E1BEE7)}
.c6{background:linear-gradient(135deg,#FFEBEE,#FFCDD2)}
.c7{background:linear-gradient(135deg,#E0F7FA,#B2EBF2)}
.c8{background:linear-gradient(135deg,#FFF3E0,#FFE0B2)}

/* ===== FLOAT BTN ===== */
.float-post{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%);
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border:none;border-radius:50px;
  padding:14px 28px;color:white;
  font-family:'Tajawal',sans-serif;font-size:0.96rem;font-weight:800;
  cursor:pointer;
  box-shadow:0 8px 28px rgba(232,97,10,0.5);
  z-index:90;display:flex;align-items:center;gap:8px;
  animation:fp 3s ease-in-out infinite;white-space:nowrap;
}
@keyframes fp{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(-5px)}
}
.float-post:hover{transform:translateX(-50%) scale(1.05)!important;animation:none}

/* ===== OVERLAY ===== */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);z-index:300;
  backdrop-filter:blur(5px);
  align-items:flex-end;
}
.overlay.open{display:flex}

.sheet{
  background:white;width:100%;
  border-radius:24px 24px 0 0;
  max-height:94vh;overflow-y:auto;
  padding:0 18px 36px;
  animation:su 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:50px;margin:14px auto 18px}
.sheet-title{font-family:'Amiri',serif;font-size:1.4rem;color:var(--primary);text-align:center;margin-bottom:20px}
.close-sheet{
  position:absolute;top:16px;left:16px;
  background:var(--gray);border:none;border-radius:50%;
  width:34px;height:34px;font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.close-sheet:hover{background:var(--gray2)}

/* ===== FORM ===== */
.fg{margin-bottom:13px}
.fl{display:block;font-size:0.88rem;font-weight:700;color:var(--text);margin-bottom:5px}
.fi,.fsel,.fta{
  width:100%;background:var(--gray);
  border:2px solid transparent;border-radius:12px;
  padding:11px 14px;
  font-family:'Tajawal',sans-serif;font-size:0.93rem;color:var(--text);
  outline:none;transition:border-color 0.2s;
}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--primary);background:var(--primary-pale)}
.fta{resize:vertical;min-height:80px}
.row2{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.sub-btn{
  width:100%;
  background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border:none;border-radius:14px;padding:15px;
  color:white;font-family:'Tajawal',sans-serif;
  font-size:1rem;font-weight:800;cursor:pointer;
  box-shadow:0 6px 20px rgba(232,97,10,0.35);transition:all 0.2s;margin-top:6px;
}
.sub-btn:hover{transform:translateY(-2px)}

/* EMOJI PICKER */
.ep-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;background:var(--gray);border-radius:12px;padding:10px}
.ep{font-size:1.4rem;background:white;border:2px solid transparent;border-radius:10px;padding:5px;cursor:pointer;transition:all 0.15s}
.ep:hover{border-color:var(--primary)}
.ep.sel{border-color:var(--primary);background:var(--primary-pale)}

/* TABS in auth */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--gray);border-radius:12px;padding:4px;margin-bottom:18px}
.auth-tab{background:transparent;border:none;border-radius:10px;padding:10px;font-family:'Tajawal',sans-serif;font-size:0.9rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all 0.2s}
.auth-tab.active{background:white;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}

/* DETAIL SHEET */
.det-img{width:100%;aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:7rem;margin-bottom:14px}
.det-price{font-size:1.8rem;font-weight:900;color:var(--primary);margin-bottom:3px}
.det-name{font-size:1.15rem;font-weight:800;margin-bottom:8px}
.det-desc{color:var(--text2);line-height:1.6;font-size:0.9rem;margin-bottom:12px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{background:var(--gray);border-radius:50px;padding:5px 12px;font-size:0.78rem;display:flex;align-items:center;gap:4px}
.seller-row{background:var(--gray);border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.s-av{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.s-name{font-weight:700;font-size:0.93rem}
.s-loc{font-size:0.75rem;color:var(--text2)}
.contact-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.c-wa{background:var(--green);border:none;border-radius:12px;padding:13px;color:white;font-family:'Tajawal',sans-serif;font-size:0.93rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 14px rgba(0,168,107,0.3);transition:all 0.2s}
.c-call{background:var(--primary-pale);border:2px solid var(--primary);border-radius:12px;padding:13px;color:var(--primary);font-family:'Tajawal',sans-serif;font-size:0.93rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all 0.2s}
.c-wa:hover{background:var(--green-dark)}.c-call:hover{background:var(--primary);color:white}

/* MY ADS */
.my-ad-item{background:var(--gray);border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.my-ad-em{font-size:2rem;background:white;border-radius:10px;padding:6px;flex-shrink:0}
.my-ad-info{flex:1}
.my-ad-name{font-weight:700;font-size:0.9rem}
.my-ad-price{font-size:0.82rem;color:var(--primary);font-weight:700}
.del-btn{background:var(--red);border:none;border-radius:50%;width:30px;height:30px;color:white;font-size:0.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* PROFILE INFO */
.profile-box{background:var(--gray);border-radius:14px;padding:16px;text-align:center;margin-bottom:16px}
.p-avatar{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-light));display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 10px;box-shadow:0 4px 14px rgba(232,97,10,0.35)}
.p-name{font-weight:800;font-size:1.1rem}
.p-city{font-size:0.82rem;color:var(--text2);margin-top:2px}
.logout-btn{background:var(--gray2);border:none;border-radius:50px;padding:9px 22px;font-family:'Tajawal',sans-serif;font-size:0.88rem;font-weight:700;color:var(--red);cursor:pointer;margin-top:10px;transition:all 0.2s}
.logout-btn:hover{background:#ffecec}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--brown);color:white;padding:12px 22px;border-radius:50px;font-size:0.88rem;font-weight:600;z-index:400;transition:transform 0.3s;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.25)}
.toast.show{transform:translateX(-50%) translateY(0)}

.empty-state{text-align:center;padding:50px 20px;color:var(--text2);grid-column:1/-1}
.spacer{height:90px}

/* divider */
.or-div{display:flex;align-items:center;gap:10px;margin:14px 0;color:#bbb;font-size:0.82rem}
.or-div::before,.or-div::after{content:'';flex:1;height:1px;background:#eee}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo-area">
    <div class="logo-icon">🐔</div>
    <div class="logo-text">
      <div class="logo-name">سوق الدواجن</div>
      <div class="logo-sub">الجزائر • بيع واشترِ</div>
    </div>
  </div>
  <div class="header-search">
    <span class="s-ico">🔍</span>
    <input type="text" placeholder="ابحث عن دواجن، بيض، أعلاف..." id="searchInp" oninput="onSearch()">
  </div>
  <button class="post-btn-top" onclick="clickPost()">✨ أنشر إعلانك</button>
  <button class="user-btn" id="userBtn" onclick="openProfile()">👤</button>
</header>

<!-- CATS -->
<div class="cats-bar">
  <div class="cats-scroll" id="catsRow">
    <button class="cat-pill active" data-cat="all"              onclick="setCat('all',this)">🐔 الكل</button>
    <button class="cat-pill" data-cat="دجاج حي"                onclick="setCat('دجاج حي',this)">🐓 دجاج حي</button>
    <button class="cat-pill" data-cat="دجاج مذبوح"             onclick="setCat('دجاج مذبوح',this)">🍗 مذبوح</button>
    <button class="cat-pill" data-cat="فروج"                   onclick="setCat('فروج',this)">🐤 فروج</button>
    <button class="cat-pill" data-cat="ديك رومي"               onclick="setCat('ديك رومي',this)">🦃 ديك رومي</button>
    <button class="cat-pill" data-cat="بط"                     onclick="setCat('بط',this)">🦆 بط</button>
    <button class="cat-pill" data-cat="إوز"                    onclick="setCat('إوز',this)">🪿 إوز</button>
    <button class="cat-pill" data-cat="حمام"                   onclick="setCat('حمام',this)">🕊️ حمام</button>
    <button class="cat-pill" data-cat="نعام"                   onclick="setCat('نعام',this)">🦤 نعام</button>
    <button class="cat-pill" data-cat="طيور زينة"              onclick="setCat('طيور زينة',this)">🦜 طيور زينة</button>
    <button class="cat-pill" data-cat="بيض"                    onclick="setCat('بيض',this)">🥚 بيض</button>
    <button class="cat-pill" data-cat="أرانب"                  onclick="setCat('أرانب',this)">🐇 أرانب</button>
    <button class="cat-pill" data-cat="أعلاف ومركزات"          onclick="setCat('أعلاف ومركزات',this)">🌾 أعلاف</button>
    <button class="cat-pill" data-cat="أدوية وتطعيم"           onclick="setCat('أدوية وتطعيم',this)">💉 أدوية</button>
    <button class="cat-pill" data-cat="معدات ومستلزمات"        onclick="setCat('معدات ومستلزمات',this)">🏗️ معدات</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-stats">
    <div class="hstat"><div class="hstat-n" id="hCount">0</div><div class="hstat-l">إعلان</div></div>
    <div class="hdiv"></div>
    <div class="hstat"><div class="hstat-n" id="hUsers">0</div><div class="hstat-l">بائع</div></div>
    <div class="hdiv"></div>
    <div class="hstat"><div class="hstat-n">مجاني</div><div class="hstat-l">100%</div></div>
  </div>
  <button class="hero-btn" onclick="clickPost()">✨ أنشر مجاناً</button>
</div>

<!-- PRODUCTS -->
<div class="sec-header">
  <h2 class="sec-title">🏷️ أحدث الإعلانات</h2>
  <button class="sec-all">الكل ›</button>
</div>
<div class="prod-grid" id="prodGrid"></div>
<div class="spacer"></div>

<!-- FLOAT -->
<button class="float-post" onclick="clickPost()">🐔 أنشر إعلانك مجاناً</button>

<!-- ====== AUTH SHEET ====== -->
<div class="overlay" id="authOv" onclick="bgClose(event,'authOv')">
  <div class="sheet">
    <button class="close-sheet" onclick="closeSheet('authOv')">✕</button>
    <div class="sheet-handle"></div>
    <div class="sheet-title">🐔 أهلاً بك في سوق الدواجن</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchAuth('login')">تسجيل الدخول</button>
      <button class="auth-tab" id="tabReg" onclick="switchAuth('reg')">حساب جديد</button>
    </div>

    <!-- LOGIN -->
    <div id="formLogin">
      <div class="fg"><label class="fl">📞 رقم الهاتف</label><input class="fi" id="lPhone" type="tel" placeholder="0555 00 00 00"></div>
      <div class="fg"><label class="fl">🔑 كلمة المرور</label><input class="fi" id="lPass" type="password" placeholder="••••••••"></div>
      <button class="sub-btn" onclick="doLogin()">🚀 دخول</button>
    </div>

    <!-- REGISTER -->
    <div id="formReg" style="display:none">
      <div class="fg"><label class="fl">👤 الاسم الكامل *</label><input class="fi" id="rName" placeholder="اسمك الكامل"></div>
      <div class="fg"><label class="fl">📞 رقم الهاتف *</label><input class="fi" id="rPhone" type="tel" placeholder="0555 00 00 00"></div>
      <div class="fg"><label class="fl">📍 الولاية *</label>
        <select class="fsel" id="rCity">
          <option value="">-- اختر الولاية --</option>
          <option>الجزائر العاصمة</option><option>وهران</option><option>قسنطينة</option>
          <option>عنابة</option><option>بسكرة</option><option>سطيف</option><option>تلمسان</option>
          <option>المدية</option><option>البليدة</option><option>تيزي وزو</option>
          <option>بجاية</option><option>مستغانم</option><option>باتنة</option>
          <option>أم البواقي</option><option>جيجل</option><option>سكيكدة</option>
          <option>غليزان</option><option>تيارت</option><option>الأغواط</option><option>ورقلة</option>
          <option>أخرى</option>
        </select>
      </div>
      <div class="fg"><label class="fl">🔑 كلمة المرور *</label><input class="fi" id="rPass" type="password" placeholder="8 أحرف على الأقل"></div>
      <button class="sub-btn" onclick="doRegister()">✅ إنشاء حساب مجاني</button>
    </div>
  </div>
</div>

<!-- ====== POST SHEET ====== -->
<div class="overlay" id="postOv" onclick="bgClose(event,'postOv')">
  <div class="sheet">
    <button class="close-sheet" onclick="closeSheet('postOv')">✕</button>
    <div class="sheet-handle"></div>
    <div class="sheet-title">🐔 نشر إعلان جديد</div>

    <div class="fg"><label class="fl">📌 عنوان الإعلان *</label><input class="fi" id="pTitle" placeholder="مثال: دجاج بلدي طازج للبيع" maxlength="80"></div>

    <div class="fg"><label class="fl">🗂️ الفئة *</label>
      <select class="fsel" id="pCat">
        <option value="">-- اختر الفئة --</option>
        <optgroup label="🐔 الدواجن الحية">
          <option>دجاج حي</option><option>فروج</option><option>ديك رومي</option>
          <option>بط</option><option>إوز</option><option>حمام</option>
          <option>نعام</option><option>طيور زينة</option><option>أرانب</option>
        </optgroup>
        <optgroup label="🍗 الدواجن المذبوحة">
          <option>دجاج مذبوح</option><option>فروج مذبوح</option>
          <option>ديك رومي مذبوح</option><option>بط مذبوح</option>
        </optgroup>
        <optgroup label="🥚 البيض">
          <option>بيض</option><option>بيض بلدي</option>
          <option>بيض نعام</option><option>بيض حمام</option>
        </optgroup>
        <optgroup label="🌾 الأعلاف والمستلزمات">
          <option>أعلاف ومركزات</option><option>أدوية وتطعيم</option><option>معدات ومستلزمات</option>
        </optgroup>
      </select>
    </div>

    <div class="fg"><label class="fl">📝 وصف المنتج</label><textarea class="fta" id="pDesc" placeholder="الكمية، الوزن، العمر، الحالة..."></textarea></div>

    <div class="fg"><label class="fl">💰 السعر والعملة *</label>
      <div class="row2">
        <input class="fi" id="pPrice" type="number" placeholder="السعر" min="0">
        <select class="fsel" id="pCur"><option>دج</option><option>ريال</option><option>درهم</option></select>
      </div>
    </div>

    <div class="fg"><label class="fl">🖼️ اختر رمز المنتج</label>
      <div class="ep-grid" id="epGrid"></div>
      <div style="margin-top:6px;font-size:0.78rem;color:var(--text2)">المختار: <span id="epPrev" style="font-size:1.2rem">🐔</span></div>
    </div>

    <button class="sub-btn" onclick="submitPost()">🚀 نشر الإعلان الآن</button>
  </div>
</div>

<!-- ====== PROFILE SHEET ====== -->
<div class="overlay" id="profileOv" onclick="bgClose(event,'profileOv')">
  <div class="sheet" id="profileContent">
    <button class="close-sheet" onclick="closeSheet('profileOv')">✕</button>
    <div class="sheet-handle"></div>
  </div>
</div>

<!-- ====== DETAIL SHEET ====== -->
<div class="overlay" id="detOv" onclick="bgClose(event,'detOv')">
  <div class="sheet" id="detContent">
    <button class="close-sheet" onclick="closeSheet('detOv')">✕</button>
    <div class="sheet-handle"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===========================
//  STATE
// ===========================
const EMOJIS = ['🐔','🐓','🐤','🐥','🦃','🦆','🪿','🕊️','🦜','🦤','🥚','🐇','🌾','🌽','💉','🏗️','🍗','🧺','🐣','🐑'];
const BG_COLS = ['c1','c2','c3','c4','c5','c6','c7','c8'];

let currentUser = null; // {name, phone, city, pass}
let users = [
  {name:'مزرعة الحاج محمد', phone:'0555123456', city:'الجزائر العاصمة', pass:'123456'},
  {name:'أبو أنس للدواجن',  phone:'0661234567', city:'سطيف',            pass:'123456'},
];

let ads = [
  {id:1, title:'دجاج بلدي طازج', cat:'دجاج حي', desc:'دجاج بلدي مربى طبيعي بدون هرمونات، وزن 2-3 كيلو', price:650, cur:'دج', emoji:'🐔', bg:'c1', badge:'fresh', phone:'0555123456', seller:'مزرعة الحاج محمد', city:'الجزائر العاصمة', ts:Date.now()-1e6},
  {id:2, title:'فروج مذبوح طازج يومياً', cat:'دجاج مذبوح', desc:'مذبوح صباحاً، وزن 1.2-1.8 كيلو، توصيل متاح', price:420, cur:'دج', emoji:'🍗', bg:'c2', badge:'fresh', phone:'0555123456', seller:'مزرعة الحاج محمد', city:'الجزائر العاصمة', ts:Date.now()-2e6},
  {id:3, title:'ديك رومي للبيع 12 كيلو', cat:'ديك رومي', desc:'ديك رومي مكتمل النمو، مناسب للمناسبات والأعراس', price:4800, cur:'دج', emoji:'🦃', bg:'c5', badge:null, phone:'0661234567', seller:'أبو أنس للدواجن', city:'سطيف', ts:Date.now()-3e6},
  {id:4, title:'بيض بلدي طازج 30 بيضة', cat:'بيض بلدي', desc:'بيض يومي من المزرعة مباشرة، حجم كبير', price:350, cur:'دج', emoji:'🥚', bg:'c3', badge:'new', phone:'0661234567', seller:'أبو أنس للدواجن', city:'سطيف', ts:Date.now()-4e6},
  {id:5, title:'علف دجاج مركز 50 كيلو', cat:'أعلاف ومركزات', desc:'علف مركز بروتين عالي، مناسب لجميع أنواع الدواجن', price:2200, cur:'دج', emoji:'🌾', bg:'c8', badge:null, phone:'0555123456', seller:'مزرعة الحاج محمد', city:'الجزائر العاصمة', ts:Date.now()-5e6},
  {id:6, title:'فروج حي 100 رأس بالجملة', cat:'فروج', desc:'فروج عمر 45 يوم، وزن 2 كيلو، سعر الرأس الواحد', price:280, cur:'دج', emoji:'🐤', bg:'c1', badge:'urgent', phone:'0661234567', seller:'أبو أنس للدواجن', city:'سطيف', ts:Date.now()-6e6},
  {id:7, title:'بط صحراوي حي للبيع', cat:'بط', desc:'بط صحراوي حي، وزن 2.5 كيلو، 10 رؤوس متوفرة', price:800, cur:'دج', emoji:'🦆', bg:'c4', badge:null, phone:'0555123456', seller:'مزرعة الحاج محمد', city:'الجزائر العاصمة', ts:Date.now()-7e6},
  {id:8, title:'حمام زاجل أصيل الزوج', cat:'حمام', desc:'زوج حمام زاجل سلالة أصيلة، مدرب، مع شهادة نسب', price:3500, cur:'دج', emoji:'🕊️', bg:'c7', badge:'new', phone:'0661234567', seller:'أبو أنس للدواجن', city:'سطيف', ts:Date.now()-8e6},
];

let currentCat = 'all';
let searchQ = '';
let selEmoji = '🐔';

// ===========================
//  RENDER
// ===========================
function render(){
  document.getElementById('hCount').textContent = ads.length;
  document.getElementById('hUsers').textContent = users.length;

  let list = [...ads].sort((a,b)=>b.ts-a.ts);
  if(currentCat!=='all') list = list.filter(a=>a.cat===currentCat);
  if(searchQ) list = list.filter(a=>a.title.includes(searchQ)||a.desc.includes(searchQ)||a.cat.includes(searchQ));

  const grid = document.getElementById('prodGrid');
  if(!list.length){
    grid.innerHTML='<div class="empty-state"><div style="font-size:3rem">🔍</div><div style="margin-top:10px;font-weight:700">لا توجد إعلانات</div><div style="font-size:0.82rem;margin-top:5px">كن أول من ينشر!</div></div>';
    return;
  }
  grid.innerHTML = list.map((a,i)=>`
    <div class="prod-card" style="animation-delay:${i*0.05}s">
      <div class="card-img-wrap ${a.bg}">
        <span style="filter:drop-shadow(0 4px 10px rgba(0,0,0,0.15))">${a.emoji}</span>
        ${a.badge==='new'?'<span class="badge b-new">✨ جديد</span>':''}
        ${a.badge==='urgent'?'<span class="badge b-urgent">🔥 عاجل</span>':''}
        ${a.badge==='fresh'?'<span class="badge b-fresh">🟢 طازج</span>':''}
        <button class="fav-ico" id="fav${a.id}" onclick="toggleFav(event,${a.id})">🤍</button>
      </div>
      <div class="card-body">
        <div class="card-cat">${a.cat}</div>
        <div class="card-name">${a.title}</div>
        <div class="card-desc">${a.desc}</div>
        <div class="card-footer">
          <div class="card-price">${a.price.toLocaleString('ar')} ${a.cur}</div>
          <div class="card-loc">📍 ${a.city}</div>
        </div>
        <div class="card-btns">
          <button class="btn-detail" onclick="openDetail(${a.id})">التفاصيل</button>
          <button class="btn-contact" onclick="contactSeller('${a.phone}','${a.title}')">💬 تواصل</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ===========================
//  CAT / SEARCH
// ===========================
function setCat(cat, btn){
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  render();
}
function onSearch(){
  searchQ = document.getElementById('searchInp').value.trim();
  render();
}

// ===========================
//  FAV
// ===========================
function toggleFav(e, id){
  e.stopPropagation();
  const btn = document.getElementById('fav'+id);
  if(btn.classList.contains('liked')){ btn.textContent='🤍'; btn.classList.remove('liked'); }
  else{ btn.textContent='❤️'; btn.classList.add('liked'); showToast('💖 أُضيف للمفضلة'); }
}

// ===========================
//  DETAIL
// ===========================
function openDetail(id){
  const a = ads.find(x=>x.id===id); if(!a) return;
  const ago = getAgo(a.ts);
  document.getElementById('detContent').innerHTML=`
    <button class="close-sheet" onclick="closeSheet('detOv')">✕</button>
    <div class="sheet-handle"></div>
    <div class="det-img ${a.bg}">${a.emoji}</div>
    <div class="card-cat">${a.cat}</div>
    <div class="det-name">${a.title}</div>
    <div class="det-price">${a.price.toLocaleString('ar')} ${a.cur}</div>
    <div class="det-desc">${a.desc}</div>
    <div class="chips">
      <span class="chip">📍 ${a.city}</span>
      <span class="chip">🕐 ${ago}</span>
      ${a.badge==='fresh'?'<span class="chip">🟢 طازج</span>':''}
      ${a.badge==='new'?'<span class="chip">✨ جديد</span>':''}
      ${a.badge==='urgent'?'<span class="chip">🔥 عاجل</span>':''}
    </div>
    <div class="seller-row">
      <div class="s-av">${a.emoji}</div>
      <div><div class="s-name">👤 ${a.seller}</div><div class="s-loc">📍 ${a.city}</div></div>
    </div>
    <div class="contact-row">
      <button class="c-wa" onclick="contactSeller('${a.phone}','${a.title}')">💬 واتساب</button>
      <button class="c-call" onclick="showToast('📞 ${a.phone}')">📞 اتصل</button>
    </div>
  `;
  openSheet('detOv');
}
function getAgo(ts){
  const h=Math.floor((Date.now()-ts)/3.6e6);
  if(h<1) return 'منذ قليل';
  if(h<24) return `منذ ${h} ساعة`;
  return `منذ ${Math.floor(h/24)} يوم`;
}
function contactSeller(phone, title){
  const msg=encodeURIComponent(`السلام عليكم، رأيت إعلانكم عن: ${title}`);
  window.open(`https://wa.me/${phone.replace(/\D/g,'')}?text=${msg}`,'_blank');
}

// ===========================
//  AUTH
// ===========================
function switchAuth(tab){
  document.getElementById('formLogin').style.display = tab==='login'?'block':'none';
  document.getElementById('formReg').style.display   = tab==='reg'  ?'block':'none';
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabReg').classList.toggle('active',   tab==='reg');
}
function doLogin(){
  const phone = document.getElementById('lPhone').value.trim();
  const pass  = document.getElementById('lPass').value;
  const u = users.find(x=>x.phone===phone && x.pass===pass);
  if(!u){ showToast('❌ رقم الهاتف أو كلمة المرور غير صحيحة'); return; }
  currentUser = u;
  document.getElementById('userBtn').textContent = '😊';
  document.getElementById('userBtn').classList.add('logged');
  closeSheet('authOv');
  showToast(`🎉 أهلاً ${u.name}!`);
}
function doRegister(){
  const name  = document.getElementById('rName').value.trim();
  const phone = document.getElementById('rPhone').value.trim();
  const city  = document.getElementById('rCity').value;
  const pass  = document.getElementById('rPass').value;
  if(!name||!phone||!city||!pass){ showToast('⚠️ يرجى ملء جميع الحقول'); return; }
  if(pass.length<6){ showToast('⚠️ كلمة المرور 6 أحرف على الأقل'); return; }
  if(users.find(u=>u.phone===phone)){ showToast('❌ هذا الرقم مسجل مسبقاً'); return; }
  const newUser = {name, phone, city, pass};
  users.push(newUser);
  currentUser = newUser;
  document.getElementById('userBtn').textContent = '😊';
  document.getElementById('userBtn').classList.add('logged');
  closeSheet('authOv');
  render();
  showToast(`🎉 تم إنشاء حسابك يا ${name}!`);
}

// ===========================
//  POST
// ===========================
function clickPost(){
  if(!currentUser){ openSheet('authOv'); showToast('⚠️ سجل الدخول أولاً لنشر إعلانك'); return; }
  initEpGrid();
  openSheet('postOv');
}
function initEpGrid(){
  document.getElementById('epGrid').innerHTML = EMOJIS.map(e=>
    `<button class="ep${e===selEmoji?' sel':''}" onclick="pickEp('${e}',this)">${e}</button>`
  ).join('');
}
function pickEp(e, btn){
  selEmoji=e;
  document.getElementById('epPrev').textContent=e;
  document.querySelectorAll('.ep').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function submitPost(){
  const title = document.getElementById('pTitle').value.trim();
  const cat   = document.getElementById('pCat').value;
  const desc  = document.getElementById('pDesc').value.trim();
  const price = parseFloat(document.getElementById('pPrice').value);
  const cur   = document.getElementById('pCur').value;
  if(!title||!cat||!price){ showToast('⚠️ يرجى ملء الحقول المطلوبة'); return; }
  ads.unshift({
    id:Date.now(), title, cat,
    desc: desc||'لا يوجد وصف إضافي',
    price, cur, emoji:selEmoji,
    bg: BG_COLS[Math.floor(Math.random()*BG_COLS.length)],
    badge:'new',
    phone: currentUser.phone,
    seller: currentUser.name,
    city: currentUser.city,
    ts: Date.now()
  });
  ['pTitle','pDesc','pPrice'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pCat').value='';
  closeSheet('postOv');
  currentCat='all';
  document.querySelectorAll('.cat-pill').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-cat="all"]').classList.add('active');
  render();
  showToast('🎉 تم نشر إعلانك بنجاح!');
}

// ===========================
//  PROFILE
// ===========================
function openProfile(){
  if(!currentUser){ openSheet('authOv'); return; }
  const myAds = ads.filter(a=>a.phone===currentUser.phone);
  document.getElementById('profileContent').innerHTML=`
    <button class="close-sheet" onclick="closeSheet('profileOv')">✕</button>
    <div class="sheet-handle"></div>
    <div class="sheet-title">👤 حسابي</div>
    <div class="profile-box">
      <div class="p-avatar">🐔</div>
      <div class="p-name">${currentUser.name}</div>
      <div class="p-city">📍 ${currentUser.city} &nbsp;|&nbsp; 📞 ${currentUser.phone}</div>
      <button class="logout-btn" onclick="doLogout()">🚪 تسجيل الخروج</button>
    </div>
    <div style="font-family:'Amiri',serif;font-size:1.1rem;margin-bottom:12px;display:flex;align-items:center;gap:6px">
      🏷️ إعلاناتي <span style="font-size:0.82rem;background:var(--primary);color:white;border-radius:50px;padding:2px 10px;font-family:'Tajawal'">${myAds.length}</span>
    </div>
    ${myAds.length===0
      ? '<div style="text-align:center;padding:24px;color:var(--text2)"><div style="font-size:2.5rem">📭</div><div style="margin-top:8px">لم تنشر أي إعلان بعد</div></div>'
      : myAds.map(a=>`
        <div class="my-ad-item">
          <div class="my-ad-em">${a.emoji}</div>
          <div class="my-ad-info">
            <div class="my-ad-name">${a.title}</div>
            <div class="my-ad-price">${a.price.toLocaleString('ar')} ${a.cur}</div>
          </div>
          <button class="del-btn" onclick="deleteAd(${a.id})" title="حذف">🗑️</button>
        </div>
      `).join('')
    }
    <button class="sub-btn" style="margin-top:12px" onclick="closeSheet('profileOv');clickPost()">➕ إضافة إعلان جديد</button>
  `;
  openSheet('profileOv');
}
function doLogout(){
  currentUser=null;
  document.getElementById('userBtn').textContent='👤';
  document.getElementById('userBtn').classList.remove('logged');
  closeSheet('profileOv');
  showToast('👋 تم تسجيل الخروج');
}
function deleteAd(id){
  ads = ads.filter(a=>a.id!==id);
  render();
  openProfile();
  showToast('🗑️ تم حذف الإعلان');
}

// ===========================
//  SHEET HELPERS
// ===========================
function openSheet(id){ document.getElementById(id).classList.add('open'); }
function closeSheet(id){ document.getElementById(id).classList.remove('open'); }
function bgClose(e,id){ if(e.target===document.getElementById(id)) closeSheet(id); }

// ===========================
//  TOAST
// ===========================
let toastT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

// INIT
render();
</script>
</body>
</html>
